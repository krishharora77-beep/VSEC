<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: Arial;
        }

        .glass {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            text-align: center;
            color: white;
        }

        input {
            margin: 10px;
            padding: 10px;
            width: 220px;
            border: none;
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            background: gold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="glass">
    <h2>🔐 Access Required</h2>

    <input id="name" placeholder="Enter your name"><br>
    <input id="email" placeholder="Enter your email"><br>

    <button onclick="login()">Enter</button>
</div>

<script>
async function login() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    if (!name.trim() || !email.trim()) {
        alert("Fill all fields!");
        return;
    }

    // send to Google Sheets
    try {
        await fetch("https://script.google.com/macros/s/AKfycbyka-r5Yjz9uqCVxS9BTqxRViP22Cnaz2RVtWETjoApRg3ppqq2MOn7TIOnLDDuEmbs/exec", {
            method: "POST",
            body: JSON.stringify({ name, email })
        });
    } catch (e) {}


    // redirect to card
    window.location.href = "index.html";
}
</script>

</body>
</html>
