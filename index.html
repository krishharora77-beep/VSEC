<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Info</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            max-height: 500px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h1 {
            color: gold;
        }

        .info {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
        }

        .label {
            font-weight: bold;
            color: #38bdf8;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }

        button{
           padding: 12px 25px;
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, gold, orange);
            color: #000000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover{
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,215,0,0.15);
        }

        button:active{
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <script>
        const user = sessionsStorage.getItem("user");
        if (!user) {
            window.location.href = "login.html";
        }
    </script>

<div class="container">
    <div class="card">
        <h3 id="welcome"></h3>

<script>
document.getElementById("welcome").innerText =
    "Welcome " + localStorage.getItem("user");
</script>

        <h1>🏫 Dr. Virendra Swaroop Education Centre</h1>
    

        <div class="info">
            <span class="label">Student Name:</span> Krishnam ARORA 
        </div>

        <div class="info">
            <span class="label">Class:</span> 10th
        </div>

        <div class="info">
            <span class="label">Section:</span> C
        </div>

        <div class="info">
            <span class="label">Roll Number:</span> 24
        </div>

        <div class="info">
            <span class="label">School Address:</span> Chandpur, Farrukhabad-209625
        </div>

        <div class="info">
            <span class="label">Contact:</span> +91 8960145110
        </div>
        <button onclick="logout()">Log Out</button>
        <script>
            function logout() {
                sessionStorage.clear();
                window.location.href = "login.html";
            }
        </script>

    </div>

    <footer>
        © 2026 School Info Card
    </footer>
</div>

</html>
