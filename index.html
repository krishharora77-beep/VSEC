<!DOCTYPE html>
<html>
<head>
    <title>School Card Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .box {
            margin-top: 100px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: gold;
            border: none;
            cursor: pointer;
        }

        #card {
            display: none;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="box">
    <h1>⚠️ Access Notice</h1>
    <p>Your name will be recorded before access</p>

    <input id="username" placeholder="Enter your name">
    <br>
    <button onclick="login()">Enter</button>
</div>

<!-- CARD -->
<div id="card">
    <h1>🎫 School Card</h1>
    <h2 id="welcome"></h2>
    <p>Welcome to Digital Identification Card</p>
</div>

<script>
async function login() {
    const name = document.getElementById("username").value;

    if (!name.trim()) {
        alert("Enter your name!");
        return;
    }

    // SAVE TO GOOGLE SHEETS
    try {
        await fetch("https://script.google.com/macros/s/AKfycbyka-r5Yjz9uqCVxS9BTqxRViP22Cnaz2RVtWETjoApRg3ppqq2MOn7TIOnLDDuEmbs/exec", {
            method: "POST",
            body: JSON.stringify({ name })
        });
    } catch (e) {
        console.log("Sheet error (ignore if testing)");
    }

    // SAVE LOCALLY
    localStorage.setItem("user", name);

    showCard(name);
}

// SHOW CARD
function showCard(name) {
    document.getElementById("login").style.display = "none";
    document.getElementById("card").style.display = "block";

    document.getElementById("welcome").innerText =
        "Welcome " + name;
}

// AUTO LOGIN
const savedUser = localStorage.getItem("user");
if (savedUser) {
    showCard(savedUser);
}
</script>

</body>
</html>
