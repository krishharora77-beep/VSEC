<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Info</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h1 {
            color: gold;
        }

        .info {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
        }

        .label {
            font-weight: bold;
            color: #38bdf8;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <h1>🏫 Your School Name</h1>

        <div class="info">
            <span class="label">Student Name:</span> Your Name
        </div>

        <div class="info">
            <span class="label">Class:</span> 10th
        </div>

        <div class="info">
            <span class="label">Section:</span> A
        </div>

        <div class="info">
            <span class="label">Roll Number:</span> 23
        </div>

        <div class="info">
            <span class="label">School Address:</span> Your School Address
        </div>

        <div class="info">
            <span class="label">Contact:</span> +91 XXXXX XXXXX
        </div>

    </div>

    <footer>
        © 2026 School Info Card
    </footer>
</div>

</body>
</html>
